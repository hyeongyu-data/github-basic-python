# GitHub 자동 릴리스 노트 그룹화.
# 릴리스 만들 때: Releases → "Generate release notes"  또는
#   gh release create v0.1.0 --generate-notes
# 아래는 PR/이슈 라벨 기준으로 노트를 분류합니다.
changelog:
  categories:
    - title: 🚀 Features
      labels: [feature, enhancement]
    - title: 🐛 Fixes
      labels: [bug]
    - title: 📝 Documentation
      labels: [documentation]
    - title: ⬆️ Dependencies
      labels: [dependencies]
    - title: 🔧 Other Changes
      labels: ["*"]
