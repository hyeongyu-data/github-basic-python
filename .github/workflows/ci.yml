name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 pytest==8.3.3   # ruff는 pre-commit rev와 동일 버전으로 고정

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Test (pytest)
        run: pytest
