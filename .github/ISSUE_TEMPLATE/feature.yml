name: Feature
description: 새로운 기능이나 개선 작업을 제안합니다.
title: "[FEAT] "
labels: ["feature"]
assignees: ["hyeongyu-data"]
body:
  - type: markdown
    attributes:
      value: |
        Feature issue는 작업의 출발점입니다. PR은 이 issue의 완료 조건을 만족하도록 작게 나누어 주세요.

  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 이 변경이 왜 필요한지, 어떤 문제를 해결하는지 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 이번 issue에서 할 일을 체크리스트로 적어 주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 이 issue가 끝났다고 판단할 수 있는 기준을 적어 주세요.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 관련 링크, 설계 메모, 제약 조건이 있으면 적어 주세요.
    validations:
      required: false
